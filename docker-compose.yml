version: "3.9"

services:
  app:
    container_name: ai-pictionary-game
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3003
      HOSTNAME: 0.0.0.0
    ports:
      - "3003:3003"
    restart: unless-stopped
