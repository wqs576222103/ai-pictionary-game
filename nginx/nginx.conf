user www-data;
worker_processes auto;
pid /run/nginx.pid;
error_log /var/log/nginx/error.log;
include /etc/nginx/modules-enabled/*.conf;

events {
	worker_connections 768;
	# multi_accept on;
}

http {

	##
	# Basic Settings
	##

	sendfile on;
	tcp_nopush on;
	types_hash_max_size 2048;
	# server_tokens off;

	# server_names_hash_bucket_size 64;
	# server_name_in_redirect off;

	include /etc/nginx/mime.types;
	default_type application/octet-stream;

	##
	# SSL Settings
	##

	ssl_protocols TLSv1 TLSv1.1 TLSv1.2 TLSv1.3; # Dropping SSLv3, ref: POODLE
	ssl_prefer_server_ciphers on;

	##
	# Logging Settings
	##

	access_log /var/log/nginx/access.log;

	##
	# Gzip Settings
	##

	gzip on;

	# gzip_vary on;
	# gzip_proxied any;
	# gzip_comp_level 6;
	# gzip_buffers 16 8k;
	# gzip_http_version 1.1;
	# gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

	##
	# Virtual Host Configs
	##

	include /etc/nginx/conf.d/*.conf;
	include /etc/nginx/sites-enabled/*;


	server {
		listen 3002;

		# ... 其他配置，如SSL证书等 ...

		# 访问 https://www.wangqs.top/luck 时，返回 /usr/share/nginx/html/luck/index.html
		location /luck {
			alias /usr/share/nginx/html/luck/;
			index index.html;
			# 允许canvas
			add_header Access-Control-Allow-Origin *;
			
			# try_files $uri $uri/ =404; # 可选，增加安全性
		}

		# 访问 https://www.wangqs.top/luck-set 时，返回 /usr/share/nginx/html/luck/set.html
		location /luck-set {
			alias /usr/share/nginx/html/luck/;
			index set.html;
			# 允许canvas
			add_header Access-Control-Allow-Origin *;
			# try_files $uri $uri/ =404; # 可选，增加安全性
		}

    # ... 可能存在的其他 location 配置 ...
	}
}


